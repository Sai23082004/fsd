<!DOCTYPE html>
<html>

<head>
    <title>HTML Timetable</title>
</head>

<body>
    <h1>Class Timetable</h1>
    <table border="1" cellspacing="5" cellpadding="10">
        <caption>Weekly Timetable</caption>
        <tr>
            <th>Day</th>
            <th>9 AM - 10 AM</th>
            <th>10 AM - 11 AM</th>
            <th colspan="2">Break</th>
            <th>12 PM - 1 PM</th>
        </tr>
        <tr>
            <td>Monday</td>
            <td>Math</td>
            <td>Science</td>
            <td colspan="2">Break</td>
            <td>History</td>
        </tr>
        <tr>
            <td rowspan="2">Tuesday</td>
            <td>English</td>
            <td>Chemistry</td>
            <td>Physics</td>
            <td>Break</td>
            <td>Biology</td>
        </tr>
    </table>
</body>

</html>
