<!DOCTYPE html> 
<head> 
    <title>Fixed Background Image</title> 
    <style> 
        body { 
            height: 200vh; 
            /* Makes the page scrollable for demonstration */ 
            margin: 0; 
            background-image: url('funnyimage.jpg'); 
            /* Replace with your image path */ 
            background-size: cover; 
            /* Ensures the image covers the entire screen */ 
            background-repeat: no-repeat; 
            /* Prevents tiling */ 
            background-position: center; 
            /* Centers the image */ 
            background-attachment: fixed; 
            /* Fixes the image in place during scroll */ 
        } 
    </style> 
</head> 
 
<body> 
    <h1>Fixed Background Image Example</h1> 
    <p>Scroll the page to see the effect.</p> 
</body> 
 
</html>
