   <!DOCTYPE html> 
<head> 
    <title>Embed Audio and Video</title> 
</head> 
<body> 
    <header> 
        <h1>Media Embedding Example</h1> 
    </header> 
    <nav> 
        <a href="#audio">Audio</a> | 
        <a href="#video">Video</a> 
    </nav> 
    <main> 
        <section id="audio"> 
            <h2>Embedded Audio</h2> 
            <audio controls> 
                <source src="sampleaudio.mp3" type="audio/mpeg"> 
                <source src="example-audio.ogg" type="audio/ogg"> 
                Your browser does not support the audio element. 
            </audio> 
        </section> 
        <section id="video"> 
            <h2>Embedded Video</h2> 
            <video controls width="600" poster="1.jpg"> 
                <source src="samplevideo.mp4" type="video/mp4"> 
                <source src="example-video.ogg" type="video/ogg"> 
                Your browser does not support the video tag. 
            </video> 
        </section> 
    </main> 

    <footer> 
        <p>&copy; 2025 Media Embedding Example</p> 
    </footer> 
        
 
</body> 
</html>
