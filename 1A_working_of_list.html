<!DOCTYPE html>
<html>

<head>
    <title>HTML Lists</title>
</head>

<body>
    <h1>Types of Lists in HTML</h1>
    <!-- Ordered List -->
    <h2>Ordered List</h2>
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
    <!-- Unordered List -->
    <h2>Unordered List</h2>
    <ul>
        <li>Item A</li>
        <li>Item B</li>
        <li>Item C</li>
    </ul>
    <!-- Nested List -->
    <h2>Nested List</h2>
    <ul>
        <li>Outer Item 1
            <ol>
                <li>Inner Item 1</li>
                <li>Inner Item 2</li>
            </ol>
        </li>
        <li>Outer Item 2</li>
    </ul>
    <!-- Definition List -->
    <h2>Definition List</h2>
    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>
    </dl>
</body>

</html>
