<!DOCTYPE html> 
<head> 
    <title>Display Output in JavaScript</title> 
</head> 
<body> 
    <script> 
        // Using alert 
        alert("This is an alert!"); 
        // Using console.log 
        console.log("This is a console log!"); 
        // Using document.write 
        document.write("This is written to the document!"); 
        // Using innerHTML 
        document.getElementById("output").innerHTML = "This is set using innerHTML!"; 
    </script> 
    <div id="output"></div> 
</body> 
</html>
