<!DOCTYPE html> 
<html> 
<head> 
    <title>Print Numbers 1 to 10</title> 
</head> 
<body> 
    <h1>Numbers from 1 to 10</h1> 
    <div id="output"></div> 
    <script> 
        const outputDiv = document.getElementById("output"); 
        outputDiv.innerHTML += "<h2>Using for loop:</h2>"; 
        for (let i = 1; i <= 10; i++) { 
            outputDiv.innerHTML += `${i} `; 
        } 
        outputDiv.innerHTML += "<h2>Using while loop:</h2>"; 
        let i = 1; 
        while (i <= 10) { 
            outputDiv.innerHTML += `${i} `; 
            i++; 
        } 
        outputDiv.innerHTML += "<h2>Using do-while loop:</h2>"; 
        i = 1; 
        do { 
            outputDiv.innerHTML += `${i} `; 
            i++; 
        } while (i <= 10); 
    </script> 
</body> 
</html>
