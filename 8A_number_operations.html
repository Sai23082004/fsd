<!DOCTYPE html> 
<html> 
<head> 
  <title>Find Larger Number</title> 
</head> 
<body> 
  <script> 
    const num1 = parseInt(prompt("Enter the first number:")); 
    const num2 = parseInt(prompt("Enter the second number:")); 
    const num3 = parseInt(prompt("Enter the third number:")); 
    if (num1 === num2 && num2 === num3) { 
      document.body.innerHTML = "<h1>EQUAL NUMBERS</h1>"; 
    } else { 
      const largerNumber = Math.max(num1, num2, num3); 
      document.body.innerHTML = `<h1>${largerNumber} LARGER NUMBER</h1>`; 
    } 
  </script> 
</body> 
</html>
