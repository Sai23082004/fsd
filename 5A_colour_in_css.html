<!DOCTYPE html> 
<head> 
    <title>CSS Color References</title> 
    <style> 
        .hex-color { 
            background-color: #3498db; 
            color: white; 
            padding: 10px; 
        } 
        .rgb-color { 
            background-color: rgb(46, 204, 113); 
            color: black; 
            padding: 10px; 
        } 
        .rgba-color { 
            background-color: rgba(241, 196, 15, 0.8); 
            color: black; 
            padding: 10px; 
        } 
        .hsl-color { 
            background-color: hsl(120, 75%, 60%); 
            color: white; 
            padding: 10px; 
        } 
        .named-color { 
            background-color: violet; 
            color: black; 
            padding: 10px; 
        } 
    </style> 
</head> 
 

<body> 
    <div class="hex-color">Hexadecimal Color</div> 
    <div class="rgb-color">RGB Color</div> 
    <div class="rgba-color">RGBA Color</div> 
    <div class="hsl-color">HSL Color</div> 
    <div class="named-color">Named Color</div> 
</body> 
 
</html>
