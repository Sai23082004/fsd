<!DOCTYPE html>
<html>

<head>
    <title>HTML Table Example</title>
</head>

<body>
    <h1>HTML Table Example</h1>
    <table border="1">
        <tr>
            <th>Day</th>
            <th colspan="2">Schedule</th>
        </tr>
        <tr>
            <td>Monday</td>
            <td>Math</td>
            <td>Science</td>
        </tr>
        <tr>
            <td rowspan="2">Tuesday</td>
            <td>English</td>
            <td>History</td>
        </tr>
        <tr>
            <td>Physics</td>
            <td>Chemistry</td>
        </tr>
    </table>
</body>

</html>
